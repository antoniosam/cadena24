<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3b82f6',
              success: '#22c55e',
              'background-light': '#f8fafd',
              'background-dark': '#0f172a',
            },
            fontFamily: {
              display: ['Inter', 'sans-serif'],
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
          },
        },
      };
    </script>
    <title>Creation Success Confirmation Screen</title>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen"
  >
    <div class="relative flex min-h-screen flex-col overflow-x-hidden">
      <header
        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-10 py-3"
      >
        <div class="flex items-center gap-8">
          <div class="flex items-center gap-4 text-primary">
            <div class="size-8 flex items-center justify-center rounded bg-primary/10">
              <span class="material-symbols-outlined text-primary">dashboard_customize</span>
            </div>
            <h2
              class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]"
            >
              Admin Dashboard
            </h2>
          </div>
          <label class="flex flex-col min-w-40 h-10 max-w-64">
            <div class="flex w-full flex-1 items-stretch rounded-lg h-full overflow-hidden">
              <div
                class="text-slate-400 dark:text-slate-500 flex border-none bg-slate-100 dark:bg-slate-800 items-center justify-center pl-4"
              >
                <span class="material-symbols-outlined text-xl">search</span>
              </div>
              <input
                class="form-input flex w-full min-w-0 flex-1 border-none bg-slate-100 dark:bg-slate-800 focus:ring-0 h-full placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal"
                placeholder="Search projects..."
                value=""
              />
            </div>
          </label>
        </div>
        <div class="flex flex-1 justify-end gap-8">
          <div class="flex items-center gap-9">
            <a
              class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
              href="#"
              >Dashboard</a
            >
            <a class="text-primary text-sm font-medium border-b-2 border-primary" href="#"
              >Projects</a
            >
            <a
              class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
              href="#"
              >Users</a
            >
            <a
              class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
              href="#"
              >Settings</a
            >
          </div>
          <div class="flex gap-2">
            <button
              class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700"
            >
              <span class="material-symbols-outlined text-xl">notifications</span>
            </button>
            <button
              class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700"
            >
              <span class="material-symbols-outlined text-xl">account_circle</span>
            </button>
          </div>
          <div
            class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 ring-2 ring-primary/20"
            style="
              background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBVvnuRdiW4lSQIHz5OUOLmtWg0rnriuHqpCsa_yS4kqBT0pUYvSYTifNbMzoi74Dg1D8biwMpMc7U2Vr_TRaibHMgyu6syJ-cl5t9oLJTEMngo3umR-C6n-M_Kd_22oHlODXdFswHmEMU2VwBD2y0YyECEgPhXBNSZJqak8uZx6KVdNVw1Lt7VvdSlouDoRaABZGP_sggksZcOtZsTYRS7kyhvfOXUiuP27bCsCRIZ51xLjjqUD9O0Rb13DgAa3HdUsts0j8PSgA');
            "
          ></div>
        </div>
      </header>
      <main class="flex-1 p-8 filter blur-sm grayscale-[0.2]">
        <div class="max-w-6xl mx-auto">
          <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Project Management</h1>
            <button class="bg-primary text-white px-6 py-2 rounded-lg font-bold">
              New Project
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div
              class="bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700"
            >
              <div class="h-4 w-24 bg-slate-200 dark:bg-slate-700 rounded mb-4"></div>
              <div class="h-8 w-full bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
              <div class="h-4 w-2/3 bg-slate-100 dark:bg-slate-800 rounded"></div>
            </div>
            <div
              class="bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700"
            >
              <div class="h-4 w-24 bg-slate-200 dark:bg-slate-700 rounded mb-4"></div>
              <div class="h-8 w-full bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
              <div class="h-4 w-2/3 bg-slate-100 dark:bg-slate-800 rounded"></div>
            </div>
            <div
              class="bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700"
            >
              <div class="h-4 w-24 bg-slate-200 dark:bg-slate-700 rounded mb-4"></div>
              <div class="h-8 w-full bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
              <div class="h-4 w-2/3 bg-slate-100 dark:bg-slate-800 rounded"></div>
            </div>
          </div>
        </div>
      </main>
      <div
        class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 backdrop-blur-[2px]"
      >
        <div
          class="bg-white dark:bg-[#1e293b] w-full max-w-[440px] rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700/50 overflow-hidden transform animate-in fade-in zoom-in duration-300"
        >
          <div class="flex flex-col items-center p-8 text-center">
            <div
              class="mb-6 flex size-20 items-center justify-center rounded-full bg-success/10 dark:bg-success/20"
            >
              <span class="material-symbols-outlined text-success text-5xl font-bold"
                >check_circle</span
              >
            </div>
            <h2 class="text-slate-900 dark:text-slate-50 text-2xl font-bold mb-3">
              Project Created!
            </h2>
            <p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed mb-8">
              Your new project has been successfully set up and is now ready for use.
            </p>
            <div class="flex w-full gap-3">
              <button
                class="flex-1 h-12 flex items-center justify-center rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold hover:bg-slate-300 dark:hover:bg-slate-600 transition-all border border-transparent"
              >
                Close
              </button>
              <button
                class="flex-1 h-12 flex items-center justify-center rounded-lg bg-primary text-white font-bold hover:bg-blue-600 shadow-lg shadow-primary/20 transition-all"
              >
                Go to Project
              </button>
            </div>
          </div>
          <div
            class="bg-slate-50 dark:bg-slate-800/50 px-8 py-4 border-t border-slate-100 dark:border-slate-700/50 flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-sm"
              >settings</span
            >
            <p class="text-xs text-slate-500 dark:text-slate-400">
              You can adjust project settings at any time in the management panel.
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
