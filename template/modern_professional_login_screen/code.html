<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Focused Dark Mode Login Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3b82f6',
              'slate-950': '#0f172a',
              'slate-900': '#1e293b',
            },
            fontFamily: {
              display: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-slate-950 text-slate-100;
        }
      }
      .geometric-bg {
        background-color: #0f172a;
        background-image:
          radial-gradient(#1e293b 0.5px, transparent 0.5px),
          radial-gradient(#1e293b 0.5px, #0f172a 0.5px);
        background-size: 24px 24px;
        background-position:
          0 0,
          12px 12px;
      }
      .input-focus-glow:focus {
        box-shadow:
          0 0 0 2px rgba(59, 130, 246, 0.2),
          0 0 15px rgba(59, 130, 246, 0.1);
      }
    </style>
  </head>
  <body class="font-display min-h-screen flex items-center justify-center geometric-bg p-4">
    <div class="w-full max-w-md">
      <div class="bg-slate-900 shadow-2xl rounded-2xl overflow-hidden border border-slate-800/60">
        <div class="pt-12 pb-6 flex flex-col items-center">
          <div
            class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white mb-4 shadow-lg shadow-primary/20"
          >
            <span class="material-symbols-outlined text-3xl">dashboard_customize</span>
          </div>
          <h1 class="text-2xl font-bold tracking-tight text-white">Welcome Back</h1>
          <p class="text-slate-400 mt-2 text-sm">Please enter your details to sign in</p>
        </div>
        <div class="px-8 pb-12">
          <form action="#" class="space-y-5">
            <div class="space-y-2">
              <label class="text-sm font-medium text-slate-300" for="email">Email Address</label>
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500"
                >
                  <span class="material-symbols-outlined text-sm">mail</span>
                </div>
                <input
                  class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-slate-800/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm input-focus-glow"
                  id="email"
                  name="email"
                  placeholder="name@company.com"
                  type="email"
                />
              </div>
            </div>
            <div class="space-y-2">
              <div class="flex justify-between items-center">
                <label class="text-sm font-medium text-slate-300" for="password">Password</label>
                <a
                  class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors"
                  href="#"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500"
                >
                  <span class="material-symbols-outlined text-sm">lock</span>
                </div>
                <input
                  class="block w-full pl-10 pr-10 py-3 border border-slate-700 rounded-lg bg-slate-800/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm input-focus-glow"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  type="password"
                />
                <button
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 transition-colors"
                  type="button"
                >
                  <span class="material-symbols-outlined text-sm">visibility</span>
                </button>
              </div>
            </div>
            <div class="flex items-center">
              <input
                class="h-4 w-4 text-primary focus:ring-primary/30 border-slate-700 rounded bg-slate-800 cursor-pointer"
                id="remember-me"
                name="remember-me"
                type="checkbox"
              />
              <label
                class="ml-2 block text-sm text-slate-400 cursor-pointer select-none"
                for="remember-me"
              >
                Keep me logged in
              </label>
            </div>
            <button
              class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-lg shadow-primary/20 text-sm font-bold text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-primary transition-all mt-4"
              type="submit"
            >
              Sign In
            </button>
          </form>
        </div>
      </div>
      <div class="mt-8 flex justify-between items-center px-4">
        <div class="flex space-x-4">
          <a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#"
            >Help Center</a
          >
          <a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#"
            >Privacy Policy</a
          >
        </div>
        <div class="flex items-center text-xs text-slate-500">
          <span
            class="flex h-2 w-2 rounded-full bg-green-500/80 mr-2 shadow-[0_0_8px_rgba(34,197,94,0.4)]"
          ></span>
          System Operational
        </div>
      </div>
    </div>
  </body>
</html>
