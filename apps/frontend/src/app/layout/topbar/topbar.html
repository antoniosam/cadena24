<header class="wms-topbar">
  <!-- Search -->
  <div class="wms-search">
    <span class="wms-search-icon">
      <i class="bi bi-search"></i>
    </span>
    <input class="wms-search-input" type="search" placeholder="Buscar..." />
  </div>

  <!-- Right actions -->
  <div class="d-flex align-items-center gap-2">
    <!-- Notifications -->
    <button class="btn-icon btn-icon-neutral position-relative" title="Notificaciones">
      <i class="bi bi-bell"></i>
      <span class="notification-dot"></span>
    </button>

    <!-- Divider -->
    <div class="wms-divider" style="height: 24px"></div>

    <!-- User avatar with dropdown menu -->
    <div
      class="topbar-user-area d-flex align-items-center gap-2 position-relative"
      (click)="toggleUserMenu(); $event.stopPropagation()"
      role="button"
      [attr.aria-haspopup]="true"
      [attr.aria-expanded]="isUserMenuOpen()"
      tabindex="0"
    >
      <div class="avatar avatar-md avatar-primary">{{ getUserInitials() }}</div>
      <div class="d-none d-md-block">
        <div class="topbar-user-name">
          {{ authState.userName() }}
          <i
            class="bi bi-chevron-down ms-1 topbar-user-chevron"
            [class.rotate]="isUserMenuOpen()"
          ></i>
        </div>
        <div class="topbar-user-role">{{ getRoleLabel() }}</div>
      </div>

      <!-- Dropdown menu -->
      @if (isUserMenuOpen()) {
      <div class="topbar-user-menu" role="menu">
        <button
          class="topbar-user-menu-item"
          (click)="onLogout(); $event.stopPropagation()"
          role="menuitem"
        >
          <i class="bi bi-box-arrow-right"></i>
          <span>Cerrar sesión</span>
        </button>
      </div>
      }
    </div>
  </div>
</header>
