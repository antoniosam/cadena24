<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">
      <i class="bi bi-box-seam me-2"></i>
      {{ appTitle }}
    </a>
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="!isMenuCollapsed"
      aria-controls="navbarNav"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav" [class.show]="!isMenuCollapsed">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-house me-1"></i>
            Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-speedometer2 me-1"></i>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/users" routerLinkActive="active">
            <i class="bi bi-people me-1"></i>
            Usuarios
          </a>
        </li>
      </ul>

      <!-- User info + logout -->
      @if (authState.isAuthenticated()) {
        <div class="d-flex align-items-center gap-2 ms-3">
          <span class="text-white small">
            <i class="bi bi-person-circle me-1"></i>{{ authState.userName() }}
          </span>
          <button class="btn btn-outline-light btn-sm" (click)="onLogout()">
            <i class="bi bi-box-arrow-right me-1"></i>Salir
          </button>
        </div>
      }
    </div>
  </div>
</nav>
