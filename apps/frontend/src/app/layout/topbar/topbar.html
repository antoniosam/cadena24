<header class="wms-topbar">
  <!-- Search -->
  <div class="wms-search">
    <span class="wms-search-icon">
      <i class="bi bi-search"></i>
    </span>
    <input class="wms-search-input" type="search" placeholder="Buscar..." />
  </div>

  <!-- Right actions -->
  <div class="d-flex align-items-center gap-2">
    <!-- Notifications -->
    <button class="btn-icon btn-icon-neutral position-relative" title="Notificaciones">
      <i class="bi bi-bell"></i>
      <span class="notification-dot"></span>
    </button>

    <!-- Divider -->
    <div class="wms-divider" style="height: 24px"></div>

    <!-- User avatar -->
    <div class="d-flex align-items-center gap-2" style="cursor: pointer">
      <div class="avatar avatar-md avatar-primary">AD</div>
      <div class="d-none d-md-block">
        <div style="font-size: 0.8125rem; font-weight: 600; color: #0f172a">Admin</div>
        <div style="font-size: 0.75rem; color: #64748b">Administrador</div>
      </div>
    </div>
  </div>
</header>
